<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>後台維護｜真如苑資料網站</title>
  <meta name="theme-color" content="#0d1728" />
  <meta name="color-scheme" content="dark" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="stylesheet" href="assets/css/style.css?v=100" />
  <link rel="stylesheet" href="assets/css/admin.css?v=33" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='38' fill='none' stroke='%23d4af68' stroke-width='7' stroke-linecap='round' stroke-dasharray='220 40'/%3E%3C/svg%3E" />
</head>
<body class="admin-body admin-auth-pending">
  <div class="bg-aura"></div>
  <div class="bg-grain"></div>

  <!-- 登入畫面 -->
  <div class="login-wrap" id="loginView">
    <div class="card login-card">
      <svg class="mark" viewBox="0 0 100 100"><circle cx="50" cy="50" r="36" fill="none" stroke="#d4af68" stroke-width="6" stroke-linecap="round" stroke-dasharray="205 50" transform="rotate(120 50 50)"/><path d="M50 34c-7 8-7 16 0 24 7-8 7-16 0-24z" fill="#e7cd8f"/></svg>
      <h1>後台維護登入</h1>
      <p>真如苑資料網站 · 管理介面</p>
      <div class="alert" id="loginAlert" role="alert" aria-live="polite"></div>
      <form id="loginForm">
        <div class="field">
          <label for="adminAccount">管理帳號</label>
          <input type="text" id="adminAccount" placeholder="請輸入帳號" autocomplete="username" value="admin" required />
        </div>
        <div class="field">
          <label for="pwd">管理密碼</label>
          <div class="password-row">
            <input type="password" id="pwd" placeholder="請輸入密碼" autocomplete="current-password" required />
            <button type="button" class="password-toggle" data-toggle-password="pwd">顯示</button>
          </div>
        </div>
        <label class="remember-row">
          <input type="checkbox" id="rememberLogin" checked />
          <span>記住帳號與登入狀態，下次不用重複輸入</span>
        </label>
        <button type="submit" class="btn btn-gold full" id="loginBtn">登入</button>
      </form>
      <p style="margin-top:18px;"><a href="index.html" style="color:var(--text-dim);font-size:.84rem;">← 返回前台</a></p>
    </div>
  </div>

  <!-- 後台主體 -->
  <div class="admin-shell" id="adminShell">
    <div class="topbar">
      <div class="container">
        <a class="brand" href="index.html">
          <svg class="mark" width="32" height="32" viewBox="0 0 100 100"><circle cx="50" cy="50" r="36" fill="none" stroke="#d4af68" stroke-width="6" stroke-linecap="round" stroke-dasharray="205 50" transform="rotate(120 50 50)"/></svg>
          <span><b>後台維護</b></span>
        </a>
        <div class="right">
          <span class="pill" id="modePill">已連線</span>
          <button class="btn btn-ghost btn-sm" id="recalcStatsBtn">重新計算統計</button>
          <button class="btn btn-ghost btn-sm" id="recalcLatestBtn">計算最新上架</button>
          <button class="btn btn-ghost btn-sm" id="pwdBtn">修改密碼</button>
          <a href="index.html" class="btn btn-ghost btn-sm">看前台</a>
          <button class="btn btn-ghost btn-sm" id="logoutBtn">登出</button>
        </div>
      </div>
    </div>

    <div class="container admin-layout">
      <button type="button" class="mobile-tab-toggle" id="mobileTabToggle" aria-controls="tabs" aria-expanded="false">
        <span class="mobile-tab-hamburger" aria-hidden="true"><i></i><i></i><i></i></span>
        <span class="mobile-tab-label">分類選單</span>
        <span class="mobile-tab-current" id="mobileTabCurrent">最新消息</span>
      </button>
      <aside class="side" id="tabs"></aside>
      <main id="panels"></main>
    </div>
  </div>

  <!-- 編輯彈窗 -->
  <div class="modal-mask" id="modalMask" aria-hidden="true">
    <div class="card modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button type="button" class="modal-close" id="modalClose" aria-label="關閉編輯視窗">×</button>
      <h3 id="modalTitle">編輯</h3>
      <div class="alert" id="modalAlert" role="alert" aria-live="polite"></div>
      <form id="recordForm"><div id="formFields"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancelBtn">取消</button>
          <button type="submit" class="btn btn-gold" id="saveBtn">儲存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 修改密碼彈窗 -->
  <div class="modal-mask" id="pwdMask" aria-hidden="true">
    <div class="card modal password-modal" role="dialog" aria-modal="true" aria-labelledby="pwdDialogTitle">
      <button type="button" class="modal-close" id="pwdClose" aria-label="關閉修改密碼視窗">×</button>
      <h3 id="pwdDialogTitle">修改管理密碼</h3>
      <div class="alert" id="pwdAlert" role="alert" aria-live="polite"></div>
      <form id="pwdForm">
        <div class="field">
          <label for="oldPwd">舊密碼</label>
          <div class="password-row">
            <input type="password" id="oldPwd" autocomplete="current-password" required />
            <button type="button" class="password-toggle" data-toggle-password="oldPwd">顯示</button>
          </div>
        </div>
        <div class="field">
          <label for="newPwd">新密碼（至少 8 碼）</label>
          <div class="password-row">
            <input type="password" id="newPwd" autocomplete="new-password" minlength="8" required />
            <button type="button" class="password-toggle" data-toggle-password="newPwd">顯示</button>
          </div>
          <div class="hint">系統只會儲存加密後的密碼，無法反查目前密碼。</div>
        </div>
        <div class="field">
          <label for="confirmPwd">確認新密碼</label>
          <div class="password-row">
            <input type="password" id="confirmPwd" autocomplete="new-password" minlength="8" required />
            <button type="button" class="password-toggle" data-toggle-password="confirmPwd">顯示</button>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="pwdCancel">取消</button>
          <button type="submit" class="btn btn-gold">更新密碼</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="assets/js/config.js?v=5"></script>
  <script src="assets/js/seed-data.js?v=12"></script>
  <script src="assets/js/api.js?v=30"></script>
  <script src="assets/js/admin.js?v=56"></script>
</body>
</html>
